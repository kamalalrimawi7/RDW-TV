name: Build RDW TV IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
      
      - name: Install CocoaPods
        run: |
          cd RdwTv/ios
          pod install --repo-update
          cd ../..
      
      - name: Create jsbundle
        run: |
          npx react-native bundle \
            --entry-file index.js \
            --platform ios \
            --dev false \
            --bundle-output RdwTv/ios/main.jsbundle \
            --assets-dest RdwTv/ios
      
      - name: Build archive
        run: |
          cd RdwTv/ios
          xcodebuild \
            -workspace RdwTv.xcworkspace \
            -scheme RdwTv \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -archivePath build/RdwTv.xcarchive \
            SWIFT_OPTIMIZATION_LEVEL=-Onone \
            ONLY_ACTIVE_ARCH=NO \
            archive
          cd ../..
      
      - name: Create ExportOptions.plist
        run: |
          cd RdwTv/ios
          mkdir -p build/Export
          cat > build/ExportOptions.plist << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>method</key>
    <string>ad-hoc</string>
    <key>signingStyle</key>
    <string>automatic</string>
    <key>stripSwiftSymbols</key>
    <true/>
    <key>uploadBitcode</key>
    <false/>
    <key>compileBitcode</key>
    <false/>
</dict>
</plist>
EOF
      
      - name: Export IPA
        run: |
          cd RdwTv/ios
          xcodebuild \
            -exportArchive \
            -archivePath build/RdwTv.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/Export
          cd ../..
      
      - name: Check IPA
        run: |
          if [ -f "RdwTv/ios/build/Export/RdwTv.ipa" ]; then
            echo "✅ IPA Built Successfully!"
            ls -lh RdwTv/ios/build/Export/RdwTv.ipa
          else
            echo "❌ IPA not found!"
            find RdwTv/ios/build -type f -name "*.ipa"
            exit 1
          fi
      
      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RDW-TV-IPA
          path: RdwTv/ios/build/Export/RdwTv.ipa
          retention-days: 30

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: RdwTv/ios/build/Export/RdwTv.ipa
          tag_name: v1.0.0-${{ github.run_number }}
          body: |
            🎬 RDW TV IPA Build ${{ github.run_number }}
            ✅ Build Status: Success
            📱 Platform: iOS
            
            Install with:
            - Sideloadly (https://sideloadly.io/)
            - TrollStore
            - Xcode
            
            Powered by RDW Store © 2025
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
