name: Build RDW TV IPA
on: [push]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install
        # هذه الخطوة أساسية في الـ Build الحقيقي لربط المكتبات برمجياً

      - name: Build React Native Bundle
        run: |
          mkdir -p ios/main.jsbundle
          npx react-native bundle --entry-file index.js --platform ios --dev false --bundle-output ios/main.jsbundle --assets-dest ios

      - name: Export IPA (Unsigned)
        run: |
          # بناء ملف الـ .app باستخدام xcodebuild
          xcodebuild -workspace ios/*.xcworkspace -scheme "RDW-TV" -configuration Release -sdk iphoneos -derivedDataPath build
          
          # تجهيز هيكلية الـ Payload
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r RDW-TV.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: RDW-IPA-Production
          path: RDW-TV.ipa
