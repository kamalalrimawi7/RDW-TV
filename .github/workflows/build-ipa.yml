name: Build RDW TV IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
          cd ..
      
      - name: Create jsbundle
        run: |
          npx react-native bundle \
            --entry-file index.js \
            --platform ios \
            --dev false \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios
      
      - name: Build archive (Unsigned)
        run: |
          cd ios
          xcodebuild \
            -workspace RdwTv.xcworkspace \
            -scheme RdwTv \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -archivePath build/RdwTv.xcarchive \
            SWIFT_OPTIMIZATION_LEVEL=-Onone \
            IPHONEOS_DEPLOYMENT_TARGET=15.0 \
            ONLY_ACTIVE_ARCH=NO \
            GCC_OPTIMIZATION_LEVEL=0 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ALLOWED=NO \
            archive
          cd ..
      
      - name: Create IPA manually
        run: |
          mkdir -p ios/build/Export/Payload
          cp -r ios/build/RdwTv.xcarchive/Products/Applications/RdwTv.app \
                ios/build/Export/Payload/
          cd ios/build/Export
          zip -r RdwTv.ipa Payload/
          cd ../../..
      
      - name: Check IPA
        run: |
          if [ -f "ios/build/Export/RdwTv.ipa" ]; then
            echo "✅ IPA Built Successfully!"
            ls -lh ios/build/Export/RdwTv.ipa
          else
            echo "❌ IPA not found!"
            exit 1
          fi
      
      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RDW-TV-IPA
          path: ios/build/Export/RdwTv.ipa
          retention-days: 30

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: ios/build/Export/RdwTv.ipa
          tag_name: v1.0.0-${{ github.run_number }}
          body: |
            🎬 RDW TV IPA Build ${{ github.run_number }}
            ✅ Build Status: Success
            📱 Platform: iOS
            
            Install with:
            - Sideloadly (https://sideloadly.io/)
            - TrollStore
            - AltStore
            
            Powered by RDW Store © 2025
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
