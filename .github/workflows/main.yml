name: Build RDW TV Pro IPA
on: [push]

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: RdwTv

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: RdwTv/package-lock.json

      - name: Install Dependencies
        run: |
          # التثبيت النظيف (Clean Install) لضمان عدم وجود ملفات تالفة
          npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Install CocoaPods
        run: |
          cd ios
          # تحديث المستودعات لضمان تحميل أحدث نسخ المكتبات
          pod repo update
          pod install

      - name: Build JS Bundle
        run: |
          mkdir -p ios
          npx react-native bundle --entry-file index.js --platform ios --dev false --bundle-output ios/main.jsbundle --assets-dest ios

      - name: Real Xcode Compile
        run: |
          # لقط الـ Scheme وتحديد المجلد بدقة
          SCHEME_NAME=$(xcodebuild -workspace ios/*.xcworkspace -list | grep -A 1 "Schemes:" | tail -n 1 | xargs)
          echo "Building Scheme: $SCHEME_NAME"
          
          xcodebuild -workspace ios/*.xcworkspace \
                     -scheme "$SCHEME_NAME" \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     archive -archivePath build/RdwTv.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_SPECIFIER="" \
                     COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export Official IPA
        run: |
          mkdir -p Payload
          # جلب التطبيق النهائي من مسار الـ Archive الرسمي
          cp -r build/build/Products/Release-iphoneos/*.app Payload/ 2>/dev/null || find build -name "*.app" -type d -exec cp -r {} Payload/ \;
          zip -r ../RDW-TV-Final.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: RDW-TV-Production-Build
          path: RDW-TV-Final.ipa
