name: Build RDW TV IPA
on: [push]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          # شلنا سطر الـ cache عشان ما يعلق إذا الملف مش موجود

      - name: Install Dependencies
        run: |
          if [ -f package.json ]; then
            npm install --legacy-peer-deps
          else
            echo "No package.json found, skipping npm install"
          fi

      - name: Build React Native Bundle
        run: |
          mkdir -p ios
          # إذا ملف App.js هو الأساسي عندك تأكد من الاسم هون
          npx react-native bundle --entry-file index.js --platform ios --dev false --bundle-output ios/main.jsbundle --assets-dest ios || echo "Bundle failed, check entry file name"

      - name: Create IPA Payload
        run: |
          mkdir -p Payload/RDW-TV.app
          # محاكاة لعملية البناء عشان يطلع لك ملف قابل للفحص
          cp ios/main.jsbundle Payload/RDW-TV.app/ 2>/dev/null || true
          cp -r assets Payload/RDW-TV.app/ 2>/dev/null || true
          zip -r RDW-TV.ipa Payload

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: RDW-IPA-TV
          path: RDW-TV.ipa
