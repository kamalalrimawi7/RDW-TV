name: Build RDW TV Pro IPA
on: [push]

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: RdwTv

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Install CocoaPods
        run: |
          if [ -d "ios" ]; then
            cd ios
            pod install
          else
            echo "ios directory not found inside RdwTv"
          fi

      - name: Build JS Bundle
        run: |
          mkdir -p ios
          npx react-native bundle --entry-file ../App.js --platform ios --dev false --bundle-output ios/main.jsbundle --assets-dest ios || npx react-native bundle --entry-file index.js --platform ios --dev false --bundle-output ios/main.jsbundle --assets-dest ios

      - name: Compile and Archive
        run: |
          xcodebuild -workspace ios/*.xcworkspace \
                     -scheme "RDW-TV" \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     archive -archivePath build/RDW-TV.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package IPA
        run: |
          mkdir -p Payload
          find build -name "*.app" -exec cp -r {} Payload/ \;
          zip -r ../RDW-TV.ipa Payload

      - name: Upload Final IPA
        uses: actions/upload-artifact@v4
        with:
          name: RDW-TV-Final-IPA
          path: RDW-TV.ipa
