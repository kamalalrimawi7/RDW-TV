name: Build RDW TV Pro IPA
on: [push]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          # شلنا الكاش عشان ما يعمل تعارض مع ملفات الـ lock

      - name: Install Dependencies
        run: |
          npm ci --legacy-peer-deps
          # أمر 'npm ci' هو الخيار المحترف لأنه بيبني المشروع بناءً على الـ package-lock.json بالظبط

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build JS Bundle
        run: |
          mkdir -p ios/main.jsbundle
          npx react-native bundle --entry-file index.js --platform ios --dev false --bundle-output ios/main.jsbundle --assets-dest ios

      - name: Compile and Archive
        run: |
          # بناء الـ Binary الحقيقي للتطبيق
          xcodebuild -workspace ios/*.xcworkspace \
                     -scheme "RDW-TV" \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     archive -archivePath build/RDW-TV.xcarchive \
                     CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          # جلب ملف الـ .app اللي تم إنتاجه ووضعه في الـ Payload
          cp -r build/Build/Intermediates.noindex/ArchiveIntermediates/RDW-TV/InstallationBuildProductsLocation/Applications/*.app Payload/ 2>/dev/null || cp -r build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r RDW-TV.ipa Payload

      - name: Upload Final IPA
        uses: actions/upload-artifact@v4
        with:
          name: RDW-TV-Final-IPA
          path: RDW-TV.ipa
