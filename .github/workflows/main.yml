name: Build RDW TV REAL IPA
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: RdwTv

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Create ExportOptions.plist
        run: |
          # هاد الملف هو اللي بضمن إن الـ .app والـ IPA يطلعوا صح
          cat <<EOF > ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>compileBitcode</key>
              <false/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>-</string>
          </dict>
          </plist>
          EOF

      - name: Build and Archive
        run: |
          SCHEME_NAME=$(xcodebuild -workspace ios/*.xcworkspace -list | grep -A 1 "Schemes:" | tail -n 1 | xargs)
          
          xcodebuild -workspace ios/*.xcworkspace \
                     -scheme "$SCHEME_NAME" \
                     -configuration Release \
                     -sdk iphoneos \
                     archive -archivePath build/RdwTv.xcarchive \
                     CODE_SIGNING_ALLOWED=NO

      - name: Export IPA (The Official Way)
        run: |
          # تصدير الـ IPA باستخدام الأرشفة اللي عملناها
          xcodebuild -exportArchive \
                     -archivePath build/RdwTv.xcarchive \
                     -exportPath output \
                     -exportOptionsPlist ExportOptions.plist \
                     CODE_SIGNING_ALLOWED=NO
          
          # نقل الـ IPA للمكان النهائي
          mv output/*.ipa ../RDW-TV-Final.ipa

      - name: Upload Final IPA
        uses: actions/upload-artifact@v4
        with:
          name: RDW-TV-Working-IPA
          path: RDW-TV-Final.ipa
