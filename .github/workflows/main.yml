name: Build RDW TV REAL IPA
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: RdwTv

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build JS Bundle
        run: |
          mkdir -p ios/main.jsbundle
          npx react-native bundle --entry-file index.js --platform ios --dev false --bundle-output ios/main.jsbundle --assets-dest ios || npx react-native bundle --entry-file App.js --platform ios --dev false --bundle-output ios/main.jsbundle --assets-dest ios

      - name: Real Compile (Binary)
        run: |
          # لقط اسم الـ Scheme
          SCHEME_NAME=$(xcodebuild -workspace ios/*.xcworkspace -list | grep -A 1 "Schemes:" | tail -n 1 | xargs)
          
          # بناء التطبيق كـ Binary حقيقي (هاد هو القلب النابض للتطبيق)
          xcodebuild -workspace ios/*.xcworkspace \
                     -scheme "$SCHEME_NAME" \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE_SPECIFIER=""

      - name: Create Production IPA
        run: |
          # تجهيز مجلد الـ Payload الرسمي للأيفون
          mkdir -p Payload
          
          # نسخ ملف الـ .app اللي تم عمل Compile حقيقي له
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" -type d | head -n 1)
          cp -r "$APP_PATH" Payload/
          
          # إضافة الـ JS Bundle جوا التطبيق عشان يشتغل الكود تبعك
          cp ios/main.jsbundle Payload/*.app/ 2>/dev/null || true
          
          # ضغط الملف بصيغة IPA
          zip -r ../RDW-TV-Final.ipa Payload

      - name: Upload Working IPA
        uses: actions/upload-artifact@v4
        with:
          name: RDW-TV-Final-Build
          path: RDW-TV-Final.ipa
